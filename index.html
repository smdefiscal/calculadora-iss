<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Municipal de ISS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Sistema Municipal de ISS - Construção Civil</h1>
        
        <div class="form-group">
            <label>Nome do Contribuinte:</label>
            <input type="text" id="nome" placeholder="Nome completo">
        </div>

        <div class="form-group">
            <label>Data de Aprovação do Alvará (DD/MM/AAAA):</label>
            <input type="text" id="data_alvara" maxlength="10" placeholder="00/00/0000">
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="alteracao">
            <label for="alteracao">Houve alteração no projeto após 01/01/2024?</label>
        </div>

        <div class="form-group">
            <label>Valor do CUB:</label>
            <input type="number" id="cub" step="0.01">
        </div>

        <div class="form-group">
            <label>Valor da Metragem (m²):</label>
            <input type="number" id="metragem" step="0.01">
        </div>

        <div class="form-group">
            <label>Apresenta Nota Fiscal?</label>
            <div class="radio-group">
                <input type="radio" name="nf_radio" value="s" id="nf_sim"> <label for="nf_sim">Sim</label>
                <input type="radio" name="nf_radio" value="n" id="nf_nao" checked> <label for="nf_nao">Não</label>
            </div>
        </div>

        <div class="form-group">
            <label>Valor a Abater da Nota Fiscal:</label>
            <input type="number" id="valor_nf" step="0.01" disabled>
        </div>

        <button id="btnCalcular" class="btn-calc">Calcular ISS</button>
        <button id="btnPdf" class="btn-pdf" disabled>Exportar PDF</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
